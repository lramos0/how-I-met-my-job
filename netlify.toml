[build]
  command = "node write-firebase-config.js"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/jobs"
  to = "/.netlify/functions/jobs"
  status = 200

[[headers]]
  for = "/data/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store"
